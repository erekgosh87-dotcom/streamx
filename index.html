<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Dhurandhar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00eeff;
            --primary-glow: rgba(0, 238, 255, 0.5);
            --secondary: #ff0055;
            --bg-dark: #070709;
            --text: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-touch-callout: none;
            user-select: none;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 48px;
            background: rgba(7, 7, 9, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .animated-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(90deg, #ff0055, #ffaa00, #00eeff, #ff0055);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s infinite linear;
            letter-spacing: -1px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: filter 0.5s ease;
        }

        video::-webkit-media-controls {
            display: none !important;
        }

        /* Fake Video Quality Decreaser */
        video[data-quality="720"] { filter: blur(0.7px) contrast(0.95); }
        video[data-quality="480"] { filter: blur(1.5px) contrast(0.85); }

        .spinner-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { opacity: 0; pointer-events: none; }

        .controls-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 30%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        .video-container:hover .controls-overlay,
        .video-container.active .controls-overlay {
            opacity: 1;
        }
        
        .controls-overlay:hover {
            opacity: 1 !important;
        }

        .controls {
            padding: 0 32px 32px;
            width: 100%;
        }

        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 24px;
            transition: height 0.2s;
            overflow: visible;
        }

        .progress-wrapper:hover {
            height: 8px;
        }

        .buffer-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            width: 0%;
        }

        .progress-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            box-shadow: 0 0 10px var(--primary-glow);
            transition: width 0.1s linear;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-wrapper:hover .progress-bar::after,
        .controls-overlay:hover .progress-bar::after {
            transform: translateY(-50%) scale(1);
        }

        .buttons-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .left-controls { gap: 16px; }

        button {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, filter 0.2s;
            outline: none;
            color: #fff;
        }

        button:hover {
            transform: scale(1.15);
        }

        .play-btn { width: 40px; height: 40px; }
        .play-btn svg {
            width: 100%; height: 100%; fill: #fff;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
            transition: filter 0.3s;
        }
        .play-btn:hover svg { filter: drop-shadow(0 0 12px var(--primary)); }

        .skip-btn { width: 32px; height: 32px; font-weight: bold; position: relative;}
        .skip-btn svg { width: 28px; height: 28px; fill: #fff; opacity: 0.9; }

        .icon {
            width: 24px; height: 24px; fill: #fff; opacity: 0.9;
            transition: opacity 0.2s;
        }

        button:hover .icon, button:hover svg { opacity: 1; }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-slider {
            width: 0;
            opacity: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-container:hover .volume-slider,
        .volume-slider:focus {
            width: 80px;
            opacity: 1;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #fff;
        }

        .time-display {
            font-size: 14px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.7);
        }

        .time-display span:first-child { color: #fff; }

        /* Quality Dropdown */
        .quality-container { position: relative; display: flex; align-items: center; justify-content: center;}
        .quality-menu {
            position: absolute;
            bottom: 40px; right: -20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            display: none; flex-direction: column;
            overflow: hidden; min-width: 100px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .quality-menu.show { display: flex; }
        .quality-menu div {
            padding: 10px 16px; font-size: 13px; cursor: pointer; color: #ccc;
            transition: background 0.2s;
        }
        .quality-menu div:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .quality-menu div.active { color: var(--primary); font-weight: bold; background: rgba(0, 238, 255, 0.1); }

        .overlay-animation {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 72px; height: 72px;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 15;
        }

        .overlay-animation.animate { animation: pop 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
        }

        .overlay-animation svg { fill: #fff; width: 36px; height: 36px; }

        .seek-animation {
            position: absolute; top: 0; bottom: 0; width: 30%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0; pointer-events: none; z-index: 15;
        }

        .seek-left { left: 0; border-top-right-radius: 50%; border-bottom-right-radius: 50%; }
        .seek-right { right: 0; border-top-left-radius: 50%; border-bottom-left-radius: 50%; }

        .seek-animation.animate { animation: fadeRipple 0.5s ease-out forwards; }
        @keyframes fadeRipple {
            0% { opacity: 0; transform: scale(0.95); }
            30% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        .seek-icon-svg { fill: #fff; width: 40px; height: 40px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
        .seek-text { font-size: 18px; font-weight: 700; margin-top: 12px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }

        .video-info { margin-top: 36px; padding: 0 12px; animation: slideUp 0.6s ease-out; margin-bottom: 60px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .video-info h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; color: #fff; letter-spacing: -0.5px; }
        .video-info p { font-size: 17px; color: var(--text-muted); line-height: 1.6; max-width: 800px; }

        @media (max-width: 768px) {
            header { padding: 16px 24px; }
            main { padding: 0; margin-top: 0; }
            .video-container { border-radius: 0; box-shadow: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .volume-container { display: none; }
            .controls { padding: 0 20px 20px; }
            .video-info { padding: 24px; margin-top: 0; }
            .video-info h2 { font-size: 26px; }
            .buttons-row { gap: 16px; }
            .controls-overlay { background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 40%, transparent 70%); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <main>

    <script>
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });

        const video = document.getElementById('videoPlayer');
        video.src = 'https://pub-82f7b19554224f9eae95dca653d9228e.r2.dev/output.mp4';

        const container = document.getElementById('videoContainer');
        const playBtn = document.getElementById('playBtn');
        const playBtnIcon = document.getElementById('playBtnIcon');
        const muteBtn = document.getElementById('muteBtn');
        const muteIcon = document.getElementById('muteIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const bufferBar = document.getElementById('bufferBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        const spinner = document.getElementById('spinner');
        
        const overlayAnim = document.getElementById('overlayAnim');
        const overlayIcon = document.getElementById('overlayIcon');
        const seekLeft = document.getElementById('seekLeft');
        const seekRight = document.getElementById('seekRight');
        const rewindBtnControls = document.getElementById('rewindBtnControls');
        const forwardBtnControls = document.getElementById('forwardBtnControls');

        const qualityBtn = document.getElementById('qualityBtn');
        const qualityMenu = document.getElementById('qualityMenu');
        const qualityOptions = qualityMenu.querySelectorAll('div');

        const ICONS = {
            play: 'M8 5v14l11-7z',
            pause: 'M6 19h4V5H6v14zm8-14v14h4V5h-4z',
            volOn: 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',
            volOff: 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z',
            fullOn: 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z',
            fullOff: 'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z'
        };

        // Unmuted default, so set volume icons to ON
        playBtnIcon.innerHTML = `<path d="${ICONS.play}"/>`; // Starts paused for unmuted by default unless allowed by browser
        muteIcon.innerHTML = `<path d="${ICONS.volOn}"/>`;
        fullscreenIcon.innerHTML = `<path d="${ICONS.fullOn}"/>`;
        video.volume = 1;

        // Ensure button updates when autoplay block is resolved
        video.addEventListener('play', () => playBtnIcon.innerHTML = `<path d="${ICONS.pause}"/>`);
        video.addEventListener('pause', () => playBtnIcon.innerHTML = `<path d="${ICONS.play}"/>`);

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function triggerOverlayAnimation(iconData) {
            overlayIcon.innerHTML = `<path d="${iconData}"/>`;
            overlayAnim.classList.remove('animate');
            void overlayAnim.offsetWidth; 
            overlayAnim.classList.add('animate');
        }

        let controlsTimeout;
        function resetControlsTimeout() {
            container.classList.add('active');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused) container.classList.remove('active');
            }, 3000);
        }

        container.addEventListener('mousemove', resetControlsTimeout);
        container.addEventListener('touchstart', resetControlsTimeout);
        container.addEventListener('mouseleave', () => {
            if (!video.paused) container.classList.remove('active');
        });

        function togglePlay() {
            if (video.paused) {
                video.play();
                triggerOverlayAnimation(ICONS.play);
            } else {
                video.pause();
                container.classList.add('active');
                triggerOverlayAnimation(ICONS.pause);
            }
            resetControlsTimeout();
        }

        playBtn.addEventListener('click', togglePlay);

        function triggerRewind() {
            video.currentTime = Math.max(0, video.currentTime - 10);
            seekLeft.classList.remove('animate');
            void seekLeft.offsetWidth;
            seekLeft.classList.add('animate');
            resetControlsTimeout();
        }

        function triggerForward() {
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
            seekRight.classList.remove('animate');
            void seekRight.offsetWidth;
            seekRight.classList.add('animate');
            resetControlsTimeout();
        }

        rewindBtnControls.addEventListener('click', triggerRewind);
        forwardBtnControls.addEventListener('click', triggerForward);

        let lastClickTime = 0;
        let singleClickTimeout;
        container.addEventListener('click', (e) => {
            if (e.target.closest('.controls-overlay')) return;

            const now = Date.now();
            const timeDiff = now - lastClickTime;
            lastClickTime = now;

            if (timeDiff < 280) {
                clearTimeout(singleClickTimeout);
                const rect = container.getBoundingClientRect();
                if (e.clientX - rect.left < rect.width / 2) {
                    triggerRewind();
                } else {
                    triggerForward();
                }
            } else {
                singleClickTimeout = setTimeout(() => {
                    togglePlay();
                }, 280);
            }
        });

        video.addEventListener('timeupdate', () => {
            currentTimeEl.textContent = formatTime(video.currentTime);
            const progressPct = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${progressPct}%`;
        });

        video.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(video.duration);
        });

        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                bufferBar.style.width = `${(bufferedEnd / video.duration) * 100}%`;
            }
        });

        let isScrubbing = false;
        function updateScrub(e) {
            const rect = progressWrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let ratio = (clientX - rect.left) / rect.width;
            ratio = Math.max(0, Math.min(1, ratio)); 
            video.currentTime = ratio * video.duration;
        }

        progressWrapper.addEventListener('mousedown', (e) => { isScrubbing = true; updateScrub(e); });
        progressWrapper.addEventListener('touchstart', (e) => { isScrubbing = true; updateScrub(e); }, {passive: false});

        document.addEventListener('mousemove', (e) => { if (isScrubbing) updateScrub(e); });
        document.addEventListener('touchmove', (e) => { if (isScrubbing) { e.preventDefault(); updateScrub(e); } }, {passive: false});

        document.addEventListener('mouseup', () => isScrubbing = false);
        document.addEventListener('touchend', () => isScrubbing = false);

        function updateVolumeUI() {
            if (video.muted || video.volume === 0) {
                muteIcon.innerHTML = `<path d="${ICONS.volOff}"/>`;
                volumeSlider.value = 0;
            } else {
                muteIcon.innerHTML = `<path d="${ICONS.volOn}"/>`;
                volumeSlider.value = video.volume;
            }
        }

        muteBtn.addEventListener('click', () => {
            if (video.muted || video.volume === 0) {
                video.muted = false;
                video.volume = volumeSlider.dataset.lastVol > 0 ? volumeSlider.dataset.lastVol : 1;
            } else {
                volumeSlider.dataset.lastVol = video.volume;
                video.muted = true;
            }
            updateVolumeUI();
        });

        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            video.volume = val;
            video.muted = val === 0;
            updateVolumeUI();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        function updateFullscreenIcon() {
            if (document.fullscreenElement || document.webkitFullscreenElement) fullscreenIcon.innerHTML = `<path d="${ICONS.fullOff}"/>`;
            else fullscreenIcon.innerHTML = `<path d="${ICONS.fullOn}"/>`;
        }
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        // Quality Menu toggle
        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.classList.toggle('show');
        });
        
        document.addEventListener('click', () => {
            qualityMenu.classList.remove('show');
        });

        qualityOptions.forEach(opt => {
            opt.addEventListener('click', (e) => {
                qualityOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                video.setAttribute('data-quality', opt.dataset.q);
            });
        });

        document.addEventListener('keydown', (e) => {
            const tag = document.activeElement.tagName.toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;

            switch(e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'ArrowRight': e.preventDefault(); triggerForward(); break;
                case 'ArrowLeft': e.preventDefault(); triggerRewind(); break;
                case 'ArrowUp': e.preventDefault(); video.muted = false; video.volume = Math.min(1, video.volume + 0.1); updateVolumeUI(); resetControlsTimeout(); break;
                case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); if(video.volume === 0) video.muted = true; updateVolumeUI(); resetControlsTimeout(); break;
                case 'KeyF': toggleFullscreen(); break;
                case 'KeyM': muteBtn.click(); break;
            }
        });

        video.addEventListener('waiting', () => spinner.classList.remove('hidden'));
        video.addEventListener('canplay', () => spinner.classList.add('hidden'));
        video.addEventListener('playing', () => spinner.classList.add('hidden'));

        video.addEventListener('ended', () => {
            container.classList.add('active');
        });

    </script>
</body>
</html>
